app:
  kafka:
    topic: events.v1

spring:
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: event-consumers
  datasource:
    url: jdbc:postgresql://localhost:5432/eventdb
    username: eventuser
    password: eventpass

management:
  endpoints:
    web:
      exposure:
        include: health,info
